<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Basic Auth App</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>

<body>
    <div class="container flex flex-col justify-center mx-auto p-4 min-h-screen max-w-md">
        <h1 class="text-2xl font-bold mb-4">Welcome to Auth App</h1>

        <form id="loginForm" class="bg-white p-6 rounded shadow-md">
            <input id="loginEmail" type="email" placeholder="Email" class="border p-2 mb-2 w-full">
            <input id="loginPassword" type="password" placeholder="Password" class="border p-2 mb-2 w-full">
            <button class="bg-blue-500 text-white p-2 w-full">Login</button>
        </form>

        <form id="registerForm" class="bg-white p-6 rounded shadow-md">
            <input id="registerEmail" type="email" placeholder="Email" class="border p-2 mb-2 w-full">
            <input id="registerPassword" type="password" placeholder="Password" class="border p-2 mb-2 w-full">
            <button class="bg-blue-500 text-white p-2 w-full">Register</button>
        </form>
    </div>

    <script>
        const API_URL = "http://localhost:3030/auth";

        const loginForm = document.getElementById("loginForm");
        const registerForm = document.getElementById("registerForm");

        // REGISTER
        registerForm.addEventListener("submit", async (e) => {
            e.preventDefault();

            const email = document.getElementById("registerEmail").value;
            const password = document.getElementById("registerPassword").value;

            try {
                const response = await fetch(`${API_URL}/register`, {
                    method: "POST",
                    headers: {
                        "Content-Type": "application/json"
                    },
                    body: JSON.stringify({ email, password })
                });

                const data = await response.json();

                if (!response.ok) {
                    alert(data.message || "Registration failed");
                    return;
                }

                alert("User registered successfully!");
                registerForm.reset();

            } catch (error) {
                console.error("Register error:", error.message);
                alert("Something went wrong!");
            }
        });

        // LOGIN
        loginForm.addEventListener("submit", async (e) => {
            e.preventDefault();

            const email = document.getElementById("loginEmail").value;
            const password = document.getElementById("loginPassword").value;

            try {
                const response = await fetch(`${API_URL}/login`, {
                    method: "POST",
                    headers: {
                        "Content-Type": "application/json"
                    },
                    body: JSON.stringify({ email, password })
                });

                const data = await response.json();

                if (!response.ok) {
                    alert(data.message || "Login failed");
                    return;
                }

                alert("Login successful!");

                loginForm.reset();

            } catch (error) {
                console.error("Login error:", error.message);
                alert("Something went wrong!");
            }
        });
    </script>
</body>

</html>
