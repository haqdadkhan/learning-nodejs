<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Basic Auth App</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>

<body>
    <div class="container flex flex-col justify-center mx-auto p-4 min-h-screen max-w-md">
        <h1 class="text-2xl font-bold mb-4">Welcome to Auth App</h1>
        <!-- Login  -->
        <form id="loginForm" class="bg-white p-6 rounded shadow-md">
            <input id="loginEmail" type="email" placeholder="Email" class="border p-2 mb-1 w-full">
            <p id="loginEmailError" class="text-red-500 text-sm mb-2 hidden"></p>

            <input id="loginPassword" type="password" placeholder="Password" class="border p-2 mb-1 w-full">
            <p id="loginPasswordError" class="text-red-500 text-sm mb-2 hidden"></p>

            <button class="bg-blue-500 text-white p-2 w-full">Login</button>
        </form>
        <!-- Register -->
        <form id="registerForm" class="bg-white p-6 rounded shadow-md">
            <input id="registerEmail" type="email" placeholder="Email" class="border p-2 mb-1 w-full">
            <p id="registerEmailError" class="text-red-500 text-sm mb-2 hidden"></p>

            <input id="registerPassword" type="password" placeholder="Password" class="border p-2 mb-1 w-full">
            <p id="registerPasswordError" class="text-red-500 text-sm mb-2 hidden"></p>

            <button class="bg-blue-500 text-white p-2 w-full">Register</button>
        </form>
    </div>

    <script>
        const API_URL = "http://localhost:3030/auth";

        const loginForm = document.getElementById("loginForm");
        const registerForm = document.getElementById("registerForm");

        // REGISTER
        registerForm.addEventListener("submit", async (e) => {
            e.preventDefault();
            clearRegisterErrors();

            const email = document.getElementById("registerEmail").value;
            const password = document.getElementById("registerPassword").value;

            if (!email || !password) {
                if (!email) {
                    showError("registerEmail", "registerEmailError", "Email is required");
                }
                if (!password) {
                    showError("registerPassword", "registerPasswordError", "Password is required");
                }
                return;
            }


            try {
                const response = await fetch(`${API_URL}/register`, {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({ email, password })
                });

                const data = await response.json();

                if (!response.ok) {

                    if (response.status === 409) {
                        showError("registerEmail", "registerEmailError", data.message);
                    } else {
                        showError("registerEmail", "registerEmailError", data.message);
                    }

                    return;
                }

                alert("User registered successfully!");
                registerForm.reset();

            } catch (error) {
                console.error("Register error:", error.message);
                showError("registerEmail", "registerEmailError", "Server error. Try again.");
            }
        });

        // LOGIN
        loginForm.addEventListener("submit", async (e) => {
            e.preventDefault();
            clearLoginErrors();

            const email = document.getElementById("loginEmail").value;
            const password = document.getElementById("loginPassword").value;

            // Frontend validation
            if (!email || !password) {
                if (!email) {
                    showError("loginEmail", "loginEmailError", "Email is required");
                }
                if (!password) {
                    showError("loginPassword", "loginPasswordError", "Password is required");
                }
                return;
            }

            try {
                const response = await fetch(`${API_URL}/login`, {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({ email, password })
                });

                const data = await response.json();

                if (!response.ok) {

                    if (response.status === 404) {
                        showError("loginEmail", "loginEmailError", data.message);
                    }
                    else if (response.status === 401) {
                        showError("loginEmail", "loginEmailError", data.message);
                        showError("loginPassword", "loginPasswordError", data.message);
                    }
                    else {
                        showError("loginEmail", "loginEmailError", data.message);
                    }

                    return;
                }

                alert("Login successful!");
                loginForm.reset();

            } catch (error) {
                console.error("Login error:", error.message);
                showError("loginEmail", "loginEmailError", error.message);
            }
        });

        // HELPER FUNCTIONS
        function showError(inputId, errorId, message) {
            const input = document.getElementById(inputId);
            const error = document.getElementById(errorId);

            input.classList.add("border-red-500");
            error.textContent = message;
            error.classList.remove("hidden");
        }

        function clearError(inputId, errorId) {
            const input = document.getElementById(inputId);
            const error = document.getElementById(errorId);

            input.classList.remove("border-red-500");
            error.textContent = "";
            error.classList.add("hidden");
        }

        function clearLoginErrors() {
            clearError("loginEmail", "loginEmailError");
            clearError("loginPassword", "loginPasswordError");
        }

        function clearRegisterErrors() {
            clearError("registerEmail", "registerEmailError");
            clearError("registerPassword", "registerPasswordError");
        }

    </script>
</body>

</html>
